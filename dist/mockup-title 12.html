<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    color: #e5e7eb;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Full-bleed hero background */
  .title-screen {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    background: url('/missile-defense/images/ID3.jpg') center 40% / cover no-repeat;
  }

  /* Heavy dark overlay — text must be razor-sharp */
  .bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,14,26,0.5) 0%,
      rgba(10,14,26,0.35) 30%,
      rgba(10,14,26,0.35) 50%,
      rgba(10,14,26,0.6) 70%,
      rgba(10,14,26,0.92) 100%
    );
  }

  /* Subtle vignette */
  .bg-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(10,14,26,0.5) 100%);
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 30px;
    margin-top: 40px;
  }

  /* Thin orange line above title */
  .accent-line {
    width: 60px;
    height: 2px;
    background: #f97316;
    margin-bottom: 16px;
    box-shadow: 0 0 12px rgba(249,115,22,0.4);
  }

  .game-title {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: #f97316;
    text-shadow: 0 0 40px rgba(249,115,22,0.3);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .game-title-he {
    font-size: 16px;
    color: #f9731680;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
  }

  .tagline {
    font-size: 13px;
    color: #9ca3af;
    letter-spacing: 0.1em;
    line-height: 1.6;
    max-width: 320px;
    margin-bottom: 40px;
  }

  /* Interceptor systems list */
  .systems {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
  }
  .system-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .system-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    box-shadow: 0 0 8px currentColor;
  }
  .system-name {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: #6b7280;
  }

  /* Start button */
  .start-btn {
    padding: 14px 48px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 0.2em;
    border-radius: 10px;
    border: 2px solid #f97316;
    background: rgba(249,115,22,0.15);
    color: #f97316;
    cursor: pointer;
    text-shadow: 0 0 20px rgba(249,115,22,0.3);
    box-shadow: 0 0 30px rgba(249,115,22,0.1), inset 0 0 30px rgba(249,115,22,0.05);
    margin-bottom: 12px;
  }

  .team-hint {
    font-size: 11px;
    color: #4b5563;
    letter-spacing: 0.1em;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 16px 20px;
  }

  .classification {
    font-size: 10px;
    color: #f9731640;
    letter-spacing: 0.2em;
    border: 1px solid #f9731625;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .version {
    font-size: 10px;
    color: #374151;
    letter-spacing: 0.1em;
  }

  .mockup-label {
    position: fixed; top: 8px; right: 12px; font-size: 10px; color: #4ade80;
    background: #0a0e1a; padding: 2px 8px; border: 1px solid #22c55e40;
    border-radius: 4px; z-index: 10;
  }
</style>
</head>
<body>

<div class="mockup-label">MOCKUP — TITLE SCREEN</div>

<div class="title-screen">
  <div class="bg-photo"></div>
  <div class="bg-overlay"></div>
  <div class="bg-vignette"></div>

  <div class="content">
    <div class="accent-line"></div>
    <div class="game-title">IRON DOME<br>COMMAND</div>
    <div class="game-title-he">פיקוד כיפת ברזל</div>
    <div class="systems">
      <div class="system-badge">
        <div class="system-dot" style="color: #eab308;"></div>
        <span class="system-name">IRON DOME</span>
      </div>
      <div class="system-badge">
        <div class="system-dot" style="color: #3b82f6;"></div>
        <span class="system-name">DAVID'S SLING</span>
      </div>
      <div class="system-badge">
        <div class="system-dot" style="color: #ef4444;"></div>
        <span class="system-name">ARROW 2</span>
      </div>
      <div class="system-badge">
        <div class="system-dot" style="color: #a855f7;"></div>
        <span class="system-name">ARROW 3</span>
      </div>
    </div>

    <div class="start-btn">BEGIN MISSION ▸</div>
    <div class="team-hint">Enter team name to start</div>
  </div>

  <div class="bottom-bar">
    <div class="classification">EDUCATIONAL SIMULATION</div>
    <div class="version">v2.0</div>
  </div>
</div>

</body>
</html>
